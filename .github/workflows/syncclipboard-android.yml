name: Build SyncClipboard Android

on:
  push:
    branches:
      - "**"
    paths:
      - "android/**"
      - ".github/workflows/syncclipboard-android.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "android/**"
      - ".github/workflows/syncclipboard-android.yml"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a signed GitHub Release from master"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  # Cheap quality gate: unit tests + lint only.
  # Do NOT assemble APKs here — release job owns the only production/legacy release build
  # so packaging work is not paid on every push/PR.
  verify:
    name: Android Gradle verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Read app version
        run: |
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          SHORT_HASH="${GITHUB_SHA::8}"
          echo "SYNCCLIPBOARD_ANDROID_VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "SYNCCLIPBOARD_ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "SYNCCLIPBOARD_SHORT_HASH=${SHORT_HASH}" >> "$GITHUB_ENV"
          echo "SYNCCLIPBOARD_ANDROID_RELEASE_VERSION=${VERSION_NAME}-${SHORT_HASH}" >> "$GITHUB_ENV"

      - name: Resolve and sync latest lumen-crash release Maven assets
        env:
          # Optional. Public Releases work without auth; bad tokens are ignored by the scripts.
          GH_TOKEN: ${{ secrets.LUMEN_CRASH_GITHUB_TOKEN || secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_GITHUB_TOKEN || secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          VERSION="$(bash ./scripts/resolve-lumen-crash-latest.sh)"
          echo "LUMEN_CRASH_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "LUMEN_CRASH_MAVEN_DIR=${PWD}/.m2-lumen-crash" >> "$GITHUB_ENV"
          echo "Resolved lumen-crash version: ${VERSION}"
          bash ./scripts/sync-lumen-crash-release-maven.sh "${VERSION}" .m2-lumen-crash

      - name: Run unit tests
        env:
          SYNCCLIPBOARD_ANDROID_VERSION_NAME: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_NAME }}
          SYNCCLIPBOARD_ANDROID_VERSION_CODE: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_CODE }}
          SYNCCLIPBOARD_SHORT_HASH: ${{ env.SYNCCLIPBOARD_SHORT_HASH }}
          LUMEN_CRASH_VERSION: ${{ env.LUMEN_CRASH_VERSION }}
          LUMEN_CRASH_MAVEN_DIR: ${{ env.LUMEN_CRASH_MAVEN_DIR }}
        run: gradle testProductionDebugUnitTest --no-daemon --warning-mode all

      - name: Run Android lint
        env:
          SYNCCLIPBOARD_ANDROID_VERSION_NAME: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_NAME }}
          SYNCCLIPBOARD_ANDROID_VERSION_CODE: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_CODE }}
          SYNCCLIPBOARD_SHORT_HASH: ${{ env.SYNCCLIPBOARD_SHORT_HASH }}
          LUMEN_CRASH_VERSION: ${{ env.LUMEN_CRASH_VERSION }}
          LUMEN_CRASH_MAVEN_DIR: ${{ env.LUMEN_CRASH_MAVEN_DIR }}
        run: gradle lintProductionDebug --no-daemon --warning-mode all

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syncclipboard-android-verification-reports
          path: |
            android/app/build/reports/tests/**
            android/app/build/reports/lint-results-productionDebug.html
            android/app/build/reports/lint-results-productionDebug.xml
          retention-days: 14

  release:
    name: Android signed release
    needs: verify
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/master' &&
      (github.event_name == 'push' || inputs.publish_release == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"
          cache-read-only: false
          cache-cleanup: on-success

      - name: Read app version
        run: |
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          SHORT_HASH="${GITHUB_SHA::8}"
          echo "SYNCCLIPBOARD_ANDROID_VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "SYNCCLIPBOARD_ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "SYNCCLIPBOARD_SHORT_HASH=${SHORT_HASH}" >> "$GITHUB_ENV"
          echo "SYNCCLIPBOARD_ANDROID_RELEASE_VERSION=${VERSION_NAME}-${SHORT_HASH}" >> "$GITHUB_ENV"

      - name: Resolve and sync latest lumen-crash release Maven assets
        env:
          GH_TOKEN: ${{ secrets.LUMEN_CRASH_GITHUB_TOKEN || secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_GITHUB_TOKEN || secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          VERSION="$(bash ./scripts/resolve-lumen-crash-latest.sh)"
          echo "LUMEN_CRASH_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "LUMEN_CRASH_MAVEN_DIR=${PWD}/.m2-lumen-crash" >> "$GITHUB_ENV"
          echo "Resolved lumen-crash version: ${VERSION}"
          bash ./scripts/sync-lumen-crash-release-maven.sh "${VERSION}" .m2-lumen-crash

      - name: Validate release secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing_secrets=()
          for secret_name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              missing_secrets+=("$secret_name")
            fi
          done

          if [ "${#missing_secrets[@]}" -gt 0 ]; then
            for secret_name in "${missing_secrets[@]}"; do
              echo "::error::$secret_name repository secret is required for signed Android releases."
            done
            exit 1
          fi

      - name: Prepare release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          keystore_file="$RUNNER_TEMP/syncclipboard-release.jks"
          if ! printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_file"; then
            echo "::error::KEYSTORE_BASE64 is not valid base64."
            exit 1
          fi
          echo "KEYSTORE_FILE=$keystore_file" >> "$GITHUB_ENV"

      # Single release packaging pass (production + legacyMigrate), signed once.
      - name: Build signed release APK
        env:
          SYNCCLIPBOARD_ANDROID_VERSION_NAME: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_NAME }}
          SYNCCLIPBOARD_ANDROID_VERSION_CODE: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_CODE }}
          SYNCCLIPBOARD_SHORT_HASH: ${{ env.SYNCCLIPBOARD_SHORT_HASH }}
          LUMEN_CRASH_VERSION: ${{ env.LUMEN_CRASH_VERSION }}
          LUMEN_CRASH_MAVEN_DIR: ${{ env.LUMEN_CRASH_MAVEN_DIR }}
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleProductionRelease assembleLegacyMigrateRelease --no-daemon --warning-mode all

      - name: Prepare release assets
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release-assets"
          VERSION="${SYNCCLIPBOARD_ANDROID_RELEASE_VERSION}"
          APK_DIR="app/build/outputs/apk/production/release"
          AGGREGATED_APK="$(find "$APK_DIR" -maxdepth 1 -type f \( -name "*universal*release*.apk" -o -name "*production*release*.apk" \) | head -n 1)"

          if [ -z "$AGGREGATED_APK" ]; then
            echo "::error::Aggregated signed release APK was not found."
            ls -lh "$APK_DIR" || true
            exit 1
          fi

          cp "$AGGREGATED_APK" "$GITHUB_WORKSPACE/release-assets/SyncClipboard_android_${VERSION}.apk"

          for variant in armeabi-v7a arm64-v8a x86 x86_64; do
            VARIANT_APK="$(find "$APK_DIR" -maxdepth 1 -type f -name "*${variant}*release*.apk" | head -n 1)"
            if [ -n "$VARIANT_APK" ]; then
              cp "$VARIANT_APK" "$GITHUB_WORKSPACE/release-assets/SyncClipboard_android_${VERSION}_${variant}.apk"
            fi
          done

          ( cd "$GITHUB_WORKSPACE/release-assets" && sha256sum *.apk > checksums.txt )

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: syncclipboard-android-release-assets
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30

      - name: Automatic release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: false
          generate_release_notes: true
          tag_name: "android-v${{ env.SYNCCLIPBOARD_ANDROID_RELEASE_VERSION }}"
          prerelease: false
          name: "SyncClipboard Android ${{ env.SYNCCLIPBOARD_ANDROID_RELEASE_VERSION }}"
          files: release-assets/*