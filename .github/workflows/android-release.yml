name: android-release

on:
  workflow_call:

permissions:
  contents: write

jobs:
  build-android:
    name: Build signed Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"
          cache-read-only: false
          cache-cleanup: on-success

      - name: Resolve version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "SYNCCLIPBOARD_ANDROID_VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "SYNCCLIPBOARD_ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "SYNCCLIPBOARD_SHORT_HASH=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Resolve and sync latest lumen-crash release Maven assets
        env:
          GH_TOKEN: ${{ secrets.LUMEN_CRASH_GITHUB_TOKEN || secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_GITHUB_TOKEN || secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          VERSION="$(bash ./scripts/resolve-lumen-crash-latest.sh)"
          echo "LUMEN_CRASH_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "LUMEN_CRASH_MAVEN_DIR=${PWD}/.m2-lumen-crash" >> "$GITHUB_ENV"
          echo "Resolved lumen-crash version: ${VERSION}"
          bash ./scripts/sync-lumen-crash-release-maven.sh "${VERSION}" .m2-lumen-crash

      - name: Prepare release signing
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64}" ]; then
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "::warning::KEYSTORE_BASE64 not set; building unsigned release APK."
            exit 0
          fi
          keystore_file="$RUNNER_TEMP/syncclipboard-release.jks"
          if ! printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_file"; then
            echo "::error::KEYSTORE_BASE64 is not valid base64."
            exit 1
          fi
          echo "KEYSTORE_FILE=$keystore_file" >> "$GITHUB_ENV"
          echo "has_signing=true" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        env:
          SYNCCLIPBOARD_ANDROID_VERSION_NAME: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_NAME }}
          SYNCCLIPBOARD_ANDROID_VERSION_CODE: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_CODE }}
          SYNCCLIPBOARD_SHORT_HASH: ${{ env.SYNCCLIPBOARD_SHORT_HASH }}
          LUMEN_CRASH_VERSION: ${{ env.LUMEN_CRASH_VERSION }}
          LUMEN_CRASH_MAVEN_DIR: ${{ env.LUMEN_CRASH_MAVEN_DIR }}
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleProductionRelease assembleLegacyMigrateRelease --no-daemon --warning-mode all

      - name: Collect release assets
        run: |
          mkdir -p "$GITHUB_WORKSPACE/android-assets"
          VERSION="${SYNCCLIPBOARD_ANDROID_VERSION_NAME}"
          APK_DIR="app/build/outputs/apk/production/release"
          AGGREGATED_APK="$(find "$APK_DIR" -maxdepth 1 -type f \( -name "*universal*release*.apk" -o -name "*universal*release*unsigned*.apk" -o -name "*production*release*.apk" -o -name "*production*release*unsigned*.apk" \) | head -n 1)"
          if [ -z "$AGGREGATED_APK" ]; then
            echo "::error::Release APK not found."
            ls -lh "$APK_DIR" || true
            exit 1
          fi
          cp "$AGGREGATED_APK" "$GITHUB_WORKSPACE/android-assets/SyncClipboard_android_${VERSION}.apk"
          for variant in armeabi-v7a arm64-v8a x86 x86_64; do
            VARIANT_APK="$(find "$APK_DIR" -maxdepth 1 -type f \( -name "*${variant}*release*.apk" -o -name "*${variant}*release*unsigned*.apk" \) | head -n 1)"
            if [ -n "$VARIANT_APK" ]; then
              cp "$VARIANT_APK" "$GITHUB_WORKSPACE/android-assets/SyncClipboard_android_${VERSION}_${variant}.apk"
            fi
          done
          ( cd "$GITHUB_WORKSPACE/android-assets" && sha256sum *.apk > checksums.txt )

      - name: Upload Android release assets
        uses: actions/upload-artifact@v4
        with:
          name: syncclipboard-android-release-assets
          path: android-assets/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish APKs to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          artifacts: android-assets/*.apk