name: android-package

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Resolve version
        run: |
          echo "SYNCCLIPBOARD_ANDROID_VERSION_NAME=1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "SYNCCLIPBOARD_ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Run unit tests
        env:
          SYNCCLIPBOARD_ANDROID_VERSION_NAME: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_NAME }}
          SYNCCLIPBOARD_ANDROID_VERSION_CODE: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_CODE }}
        run: gradle testDebugUnitTest --no-daemon --warning-mode all

      - name: Run Android lint
        env:
          SYNCCLIPBOARD_ANDROID_VERSION_NAME: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_NAME }}
          SYNCCLIPBOARD_ANDROID_VERSION_CODE: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_CODE }}
        run: gradle lintDebug --no-daemon --warning-mode all

      - name: Build debug APK for verification
        env:
          SYNCCLIPBOARD_ANDROID_VERSION_NAME: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_NAME }}
          SYNCCLIPBOARD_ANDROID_VERSION_CODE: ${{ env.SYNCCLIPBOARD_ANDROID_VERSION_CODE }}
        run: gradle assembleDebug --no-daemon --warning-mode all

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syncclipboard-android-verification-reports
          path: |
            android/app/build/reports/tests/**
            android/app/build/reports/lint-results-debug.html
            android/app/build/reports/lint-results-debug.xml
          retention-days: 14
